<!-- @dsCard group="Colors" viewport="700x150" name="Text & borders" subtitle="Three text levels; hairlines do all separation" -->
<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        background: var(--bg-1);
        padding: 16px;
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }
      .col {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .r {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }
      .t {
        font-size: var(--fs-md);
      }
      .v {
        font-family: var(--font-mono);
        font-size: var(--fs-2xs);
        color: var(--text-3);
      }
      .b {
        height: 0;
        border-top: 1px solid;
      }
    </style>
  </head>
  <body>
    <div class="col">
      <div class="r">
        <span class="t" style="color: var(--text-1)"
          >Primary — body, values</span
        ><span class="v">--text-1 #DEE5EE</span>
      </div>
      <div class="r">
        <span class="t" style="color: var(--text-2)"
          >Secondary — labels, meta</span
        ><span class="v">--text-2 #93A1B4</span>
      </div>
      <div class="r">
        <span class="t" style="color: var(--text-3)"
          >Muted — timestamps, placeholders</span
        ><span class="v">--text-3 #5D6C81</span>
      </div>
    </div>
    <div class="col">
      <div class="b" style="border-color: var(--border-1)"></div>
      <div class="v">--border-1 #1E2733 · default hairline</div>
      <div class="b" style="border-color: var(--border-2)"></div>
      <div class="v">--border-2 #2C3949 · hover / emphasis</div>
    </div>
  </body>
</html>
