<!-- @dsCard group="Type" viewport="700x170" name="Mono — JetBrains Mono" subtitle="Identifiers, URIs, SHAs, versions, timestamps, logs, JSON — always mono" -->
<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        background: var(--bg-1);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-family: var(--font-mono);
      }
      .l {
        font-size: var(--fs-2xs);
        color: var(--text-3);
        font-family: var(--font-ui);
      }
    </style>
  </head>
  <body>
    <div>
      <span class="l">resource URI · </span
      ><span style="font-size: var(--fs-sm)"
        ><span style="color: var(--accent)">pod</span
        ><span style="color: var(--text-2)"
          >://qa/checkout/checkout-6df4cbf8b</span
        ></span
      >
    </div>
    <div>
      <span class="l">artifact · </span
      ><span style="font-size: var(--fs-sm); color: var(--text-1)"
        >checkout:3.7.12
        <span style="color: var(--text-3)">(sha256:4bf9…)</span></span
      >
    </div>
    <div>
      <span class="l">timestamps · </span
      ><span style="font-size: var(--fs-sm); color: var(--text-1)"
        >14:32
        <span style="color: var(--text-3)"
          >· as of 12s ago · merged 2h</span
        ></span
      >
    </div>
    <div>
      <span class="l">rollup facts · </span
      ><span style="font-size: var(--fs-sm); color: var(--text-1)"
        >18 services · 3 unhealthy&nbsp;&nbsp;147 pods · 98% healthy</span
      >
    </div>
    <div>
      <span class="l">keys · </span
      ><span style="font-size: var(--fs-sm)"
        ><kbd
          style="
            background: var(--bg-3);
            border: 1px solid var(--border-2);
            border-radius: 3px;
            padding: 1px 5px;
            font-size: var(--fs-xs);
            color: var(--text-1);
          "
          >⌘K</kbd
        >
        <span style="color: var(--text-3)">command palette</span></span
      >
    </div>
  </body>
</html>
