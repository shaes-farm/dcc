name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref makes the in-flight run irrelevant.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: lint · types · test · build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        id: install
        run: pnpm install --frozen-lockfile

      # The checks below run even when an earlier one fails, so a single CI run
      # surfaces every problem instead of only the first. They are still gated
      # on install, since nothing is meaningful without dependencies.
      - name: Lint
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: pnpm lint

      - name: Check formatting
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: pnpm format:check

      - name: Check types
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: pnpm check-types

      - name: Unit tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: pnpm test

      # Runs through bin/dcc.mjs, which also sets NEXT_TELEMETRY_DISABLED.
      - name: Build
        if: ${{ !cancelled() && steps.install.outcome == 'success' }}
        run: pnpm build
